name: Daily Brainrot Short

on:
  schedule:
    # Runs twice daily: 7:30 AM IST (02:00 UTC) & 7:30 PM IST (14:00 UTC)
    - cron: "0 2,14 * * *"
  workflow_dispatch:
    inputs:
      style:
        description: "Brainrot style (random if empty)"
        required: false
        default: "random"
        type: choice
        options:
          - random
          - chaotic
          - meme
          - story
          - npc
      privacy:
        description: "YouTube privacy"
        required: true
        default: "public"
        type: choice
        options:
          - private
          - unlisted
          - public

concurrency:
  group: brainrot-daily
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Generate & upload brainrot short"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore clip cache
        id: cache-clips
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: brainrot-data-${{ github.run_id }}
          restore-keys: |
            brainrot-data-

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET_VALUE: ${{ secrets.YT_CLIENT_SECRET_VALUE }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          YOUTUBE_PRIVACY: ${{ github.event.inputs.privacy || 'public' }}
        run: |
          STYLE="${{ github.event.inputs.style || 'random' }}"
          python run_pipeline.py --style "$STYLE"

      - name: Save clip cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/
          key: brainrot-data-${{ github.run_id }}